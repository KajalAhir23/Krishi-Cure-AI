<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi-Cure - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Firebase SDK (Compat Version for clean browser integration) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Auth helper -->
    <script src="/js/auth.js"></script>
</head>

<body>
    <div class="warning-banner">
        <marquee scrollamount="5" id="warning_banner">Loading...</marquee>
    </div>

    <header class="app-header">
        <div class="logo">🌿 <span id="app_name">Krishi-Cure Pro</span></div>
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">ENGLISH</button>
            <button class="lang-btn" data-lang="hi">हिन्दी</button>
            <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
        </div>
    </header>

    <main class="container" style="max-width: 480px; margin-top: 5rem;">
        <section class="step-card active" style="padding: 2.5rem 2rem;">
            <h2 id="login_title" style="text-align: center; margin-bottom: 2rem; font-size: 1.8rem; font-weight: 800;">
                Farmer Login</h2>

            <!-- Message Container for Errors & Success -->
            <div id="error-message"
                style="display: none; margin-bottom: 1.5rem; padding: 0.8rem 1rem; border-radius: 12px; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; font-weight: 600; font-size: 0.95rem;">
            </div>
            <div id="success-message"
                style="display: none; margin-bottom: 1.5rem; padding: 0.8rem 1rem; border-radius: 12px; background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; font-weight: 600; font-size: 0.95rem;">
            </div>

            <!-- Phase 1: Mobile Number Input -->
            <div id="phone-section">
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label id="phone_label"
                        style="display: block; font-weight: 700; color: var(--forest-green); margin-bottom: 0.6rem; font-size: 1rem;">Mobile
                        Number</label>
                    <div style="display: flex; gap: 0.6rem; align-items: center;">
                        <span
                            style="background: rgba(45, 90, 39, 0.05); border: 2px solid var(--glass-border); padding: 1rem 0.9rem; border-radius: 14px; font-weight: 700; color: var(--text-light); font-size: 1.1rem; line-height: 1;">+91</span>
                        <input type="tel" id="phone_input" placeholder="Enter 10-digit mobile number" maxlength="10"
                            style="flex: 1; padding: 1rem 1.2rem; border-radius: 14px; border: 2px solid var(--glass-border); font-family: inherit; font-size: 1.1rem; outline: none; background: white; transition: var(--transition-smooth); font-weight: 600; color: var(--text-main);">
                    </div>
                </div>

                <button class="primary-btn" id="send_otp_btn"
                    style="width: 100%; display: flex; justify-content: center; padding: 1rem 1.5rem; font-size: 1.05rem; border-radius: 14px;">Send
                    OTP</button>

                <!-- OR Divider -->
                <div class="or-divider" id="or_divider">OR</div>

                <!-- Google Login Button -->
                <button class="google-btn" id="google_login_btn">
                    <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"
                            fill="#EA4335" />
                    </svg>
                    <span id="google_login_text">Continue with Google</span>
                </button>
            </div>

            <!-- Phase 2: OTP Verification -->
            <div id="otp-section" style="display: none;">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label id="otp_label"
                        style="display: block; font-weight: 700; color: var(--forest-green); margin-bottom: 0.6rem; font-size: 1rem;">Enter
                        OTP</label>
                    <input type="text" id="otp_input" placeholder="Enter 6-digit OTP" maxlength="6"
                        style="width: 100%; padding: 1rem 1.2rem; border-radius: 14px; border: 2px solid var(--glass-border); font-family: inherit; font-size: 1.2rem; outline: none; background: white; transition: var(--transition-smooth); font-weight: 800; text-align: center; letter-spacing: 0.4rem; color: var(--text-main);">
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.95rem;">
                    <span id="timer-display" style="font-weight: 600; color: var(--text-light);"></span>
                    <button id="resend-btn"
                        style="background: none; border: none; font-family: inherit; color: var(--forest-green); font-weight: 800; cursor: pointer; display: none; text-decoration: underline;">Resend
                        OTP</button>
                </div>

                <button class="primary-btn" id="verify_otp_btn"
                    style="width: 100%; display: flex; justify-content: center; padding: 1rem 1.5rem; font-size: 1.05rem; border-radius: 14px;">Verify
                    & Login</button>

                <button id="change-number-btn"
                    style="width: 100%; text-align: center; margin-top: 1.2rem; background: none; border: none; font-family: inherit; color: var(--text-light); font-weight: 600; cursor: pointer; text-decoration: underline; font-size: 0.9rem;">Change
                    Phone Number</button>
            </div>

            <!-- reCAPTCHA Widget -->
            <div id="recaptcha-container" style="margin-top: 1rem; display: flex; justify-content: center;"></div>
        </section>
    </main>

    <footer>
        <div class="footer">
            <div class="footer-bottom"></div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load application translations master data
            await window.initApp();

            const phoneInput = document.getElementById('phone_input');
            const otpInput = document.getElementById('otp_input');
            const sendOtpBtn = document.getElementById('send_otp_btn');
            const verifyOtpBtn = document.getElementById('verify_otp_btn');
            const changeNumberBtn = document.getElementById('change-number-btn');
            const resendBtn = document.getElementById('resend-btn');

            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            let countdownInterval = null;

            // Restrict input field characters to digits only
            const restrictToDigits = (e) => {
                e.target.value = e.target.value.replace(/\D/g, '');
            };
            phoneInput.addEventListener('input', restrictToDigits);
            otpInput.addEventListener('input', restrictToDigits);

            // Toast helper utilities
            const showError = (msg) => {
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            };

            const showSuccess = (msg) => {
                successDiv.textContent = msg;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            };

            const clearMessages = () => {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            };

            // OTP Countdown management
            const startTimer = () => {
                let seconds = 60;
                resendBtn.style.display = 'none';

                const timerDisplay = document.getElementById('timer-display');
                timerDisplay.style.display = 'inline';

                const updateText = () => {
                    const lang = window.currentLang;
                    timerDisplay.textContent = lang === 'gu'
                        ? `ફરી મોકલો: ${seconds} સેકન્ડ`
                        : lang === 'hi'
                            ? `पुनः भेजें: ${seconds} सेकंड`
                            : `Resend in ${seconds}s`;
                };

                updateText();

                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    seconds--;
                    updateText();

                    if (seconds <= 0) {
                        clearInterval(countdownInterval);
                        timerDisplay.style.display = 'none';
                        resendBtn.style.display = 'inline';
                    }
                }, 1000);
            };

            // Apply translations to layout
            const applyLoginTranslations = () => {
                if (!window.appData) return;
                const langStore = window.appData.langStore[window.currentLang] || window.appData.langStore['en'];

                document.getElementById('login_title').textContent = langStore.login_title || "Farmer Login";
                document.getElementById('phone_label').textContent = window.currentLang === 'gu' ? "મોબાઈલ નંબર" : window.currentLang === 'hi' ? "मोबाइल नंबर" : "Mobile Number";
                phoneInput.placeholder = langStore.mobile_placeholder || "Enter 10-digit mobile number";
                sendOtpBtn.textContent = langStore.send_otp || "Send OTP";

                document.getElementById('otp_label').textContent = window.currentLang === 'gu' ? "ઓટીપી દાખલ કરો" : window.currentLang === 'hi' ? "ओटीपी दर्ज करें" : "Enter OTP";
                otpInput.placeholder = langStore.otp_placeholder || "Enter 6-digit OTP";
                verifyOtpBtn.textContent = langStore.verify_otp || "Verify & Login";

                document.getElementById('change-number-btn').textContent = window.currentLang === 'gu' ? "મોબાઈલ નંબર બદલો" : window.currentLang === 'hi' ? "मोबाइल नंबर बदलें" : "Change Phone Number";
                resendBtn.textContent = window.currentLang === 'gu' ? "ફરી ઓટીપી મોકલો" : window.currentLang === 'hi' ? "पुनः ओटीपी भेजें" : "Resend OTP";

                const orDividerText = langStore.or_divider || (window.currentLang === 'gu' ? "અથવા" : window.currentLang === 'hi' ? "या" : "OR");
                const googleLoginText = langStore.google_login || (window.currentLang === 'gu' ? "ગુગલ સાથે ચાલુ રાખો" : window.currentLang === 'hi' ? "गूगल के साथ जारी रखें" : "Continue with Google");

                const orDividerEl = document.getElementById('or_divider');
                const googleLoginEl = document.getElementById('google_login_text');
                if (orDividerEl) orDividerEl.textContent = orDividerText;
                if (googleLoginEl) googleLoginEl.textContent = googleLoginText;
            };

            window.addEventListener('languageChanged', applyLoginTranslations);
            if (window.appData) applyLoginTranslations();

            // Send OTP action handler
            sendOtpBtn.addEventListener('click', async () => {
                clearMessages();
                const rawPhone = phoneInput.value.trim();
                const langStore = window.appData ? window.appData.langStore[window.currentLang] : {};

                if (rawPhone.length !== 10) {
                    showError(langStore.invalid_phone_error || "Please enter a valid 10-digit mobile number.");
                    return;
                }

                const formattedPhone = `+91${rawPhone}`;
                sendOtpBtn.disabled = true;
                sendOtpBtn.textContent = langStore.sending_otp_btn || "Sending...";

                try {
                    // Create recaptcha element
                    if (!window.recaptchaVerifier) {
                        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                            'size': 'invisible',
                            'callback': (response) => { }
                        });
                    }

                    const confirmation = await window.firebaseAuth.signInWithPhoneNumber(formattedPhone, window.recaptchaVerifier);
                    window.confirmationResult = confirmation;

                    showSuccess(langStore.otp_sent_success || "OTP sent successfully!");
                    document.getElementById('phone-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    startTimer();
                } catch (error) {
                    console.error("Error sending OTP:", error);
                    let errMsg = langStore.error_sending_otp || "Error sending OTP. Please try again.";
                    if (error && error.message) {
                        errMsg += " - " + error.message;
                    }
                    showError(errMsg);

                    if (window.recaptchaVerifier) {
                        window.recaptchaVerifier.clear();
                        window.recaptchaVerifier = null;
                    }
                } finally {
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.textContent = langStore.send_otp || "Send OTP";
                }
            });

            // Resend OTP action handler
            resendBtn.addEventListener('click', async () => {
                clearMessages();
                const rawPhone = phoneInput.value.trim();
                const formattedPhone = `+91${rawPhone}`;
                const langStore = window.appData ? window.appData.langStore[window.currentLang] : {};

                try {
                    if (window.recaptchaVerifier) {
                        window.recaptchaVerifier.clear();
                        window.recaptchaVerifier = null;
                    }

                    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                        'size': 'invisible'
                    });

                    const confirmation = await window.firebaseAuth.signInWithPhoneNumber(formattedPhone, window.recaptchaVerifier);
                    window.confirmationResult = confirmation;

                    showSuccess(langStore.otp_sent_success || "OTP sent successfully!");
                    startTimer();
                } catch (error) {
                    console.error("Error resending OTP:", error);
                    showError(langStore.error_sending_otp || "Error sending OTP. Please try again.");
                }
            });

            // Verify OTP handler
            verifyOtpBtn.addEventListener('click', async () => {
                clearMessages();
                const code = otpInput.value.trim();
                const langStore = window.appData ? window.appData.langStore[window.currentLang] : {};

                if (code.length !== 6) {
                    showError(langStore.invalid_otp_error || "Invalid OTP. Please check the code and try again.");
                    return;
                }

                verifyOtpBtn.disabled = true;
                verifyOtpBtn.textContent = langStore.verifying_otp_btn || "Verifying...";

                try {
                    await window.confirmationResult.confirm(code);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = '/index.html';
                } catch (error) {
                    console.error("Error verifying OTP:", error);
                    let errMsg = langStore.invalid_otp_error || "Invalid OTP. Please check the code and try again.";
                    if (error && error.message) {
                        errMsg += " - " + error.message;
                    }
                    showError(errMsg);
                    verifyOtpBtn.disabled = false;
                    verifyOtpBtn.textContent = langStore.verify_otp || "Verify & Login";
                }
            });

            // Change number click handler
            changeNumberBtn.addEventListener('click', () => {
                document.getElementById('otp-section').style.display = 'none';
                document.getElementById('phone-section').style.display = 'block';
                clearMessages();
            });

            // Google Sign-In click handler
            const googleBtn = document.getElementById('google_login_btn');
            if (googleBtn) {
                googleBtn.addEventListener('click', async () => {
                    clearMessages();
                    googleBtn.disabled = true;
                    const originalContent = googleBtn.innerHTML;

                    const loggingInText = window.currentLang === 'gu'
                        ? "પ્રવેશ કરી રહ્યા છીએ..."
                        : window.currentLang === 'hi'
                            ? "लॉगिन किया जा रहा है..."
                            : "Signing in...";

                    googleBtn.innerHTML = `<span>⏳</span> <span>${loggingInText}</span>`;

                    try {
                        if (!window.firebaseAuth) {
                            throw new Error("Firebase Auth is not initialized yet.");
                        }
                        const provider = new firebase.auth.GoogleAuthProvider();
                        await window.firebaseAuth.signInWithPopup(provider);
                        localStorage.setItem('isLoggedIn', 'true');
                        window.location.href = '/index.html';
                    } catch (error) {
                        console.error("Google Sign-In Error:", error);
                        let errMsg = window.currentLang === 'gu'
                            ? "ગુગલ લોગિન કરવામાં ભૂલ આવી. કૃપા કરીને ફરી પ્રયાસ કરો."
                            : window.currentLang === 'hi'
                                ? "गूगल लॉगिन में त्रुटि हुई। कृपया पुनः प्रयास करें।"
                                : "Error logging in with Google. Please try again.";
                        if (error && error.message) {
                            errMsg += " - " + error.message;
                        }
                        showError(errMsg);
                        googleBtn.disabled = false;
                        googleBtn.innerHTML = originalContent;
                    }
                });
            }
        });
    </script>
</body>

</html>
