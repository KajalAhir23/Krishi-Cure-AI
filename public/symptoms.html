<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi-Cure Pro - Symptoms</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="warning-banner">
        <marquee scrollamount="5" id="warning_banner">Loading...</marquee>
    </div>

    <header class="app-header">
        <div class="logo">🌿 <span id="app_name">Krishi-Cure Pro</span></div>
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">ENGLISH</button>
            <button class="lang-btn" data-lang="hi">हिन्दी</button>
            <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
        </div>
    </header>

    <main class="container">
        <section class="step-card active">
            <a href="/index.html" class="back-btn" id="back_btn">Back</a>
            
            <h2><span id="symptoms_for_title">Symptoms for</span> <span id="selected_crop_name" class="highlight"></span></h2>
            <p id="select_symptoms_text" class="form-label" style="font-size:1.2rem; margin-bottom:1rem; font-weight:bold;">Select all that apply:</p>
            
            <form id="symptoms-form">
                <div class="symptoms-container" id="symptoms-container">
                    <!-- Populated by JS -->
                </div>
                
                <button type="submit" class="primary-btn diagnose-btn" id="diagnose_btn" style="margin-top:2rem;">Diagnose Now</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer">
            <div class="footer-bottom"></div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/diagnostic.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await window.initApp();
            
            const cropId = localStorage.getItem('selectedCrop');
            if (!cropId) {
                window.location.href = '/index.html';
                return;
            }

            const symptomsContainer = document.getElementById('symptoms-container');
            const cropNameSpan = document.getElementById('selected_crop_name');

            const renderSymptoms = () => {
                if (!window.appData || !window.appData.symptomsList) {
                    console.error("App data or symptoms list missing", window.appData);
                    return;
                }

                const lang = window.currentLang;
                const langStore = window.appData.langStore[lang] || window.appData.langStore['en'];
                
                console.log("Rendering symptoms for lang:", lang);

                // Update crop name and get its specific symptoms
                let cropName = cropId;
                let cropSymptomsIds = null;
                for (const cat in window.appData.cropsList) {
                    const cropList = window.appData.cropsList[cat];
                    const crop = cropList.find(c => c.id === cropId);
                    if (crop) {
                        cropName = crop[lang] || crop['en'];
                        cropSymptomsIds = crop.symptoms || null;
                        break;
                    }
                }
                cropNameSpan.textContent = cropName;

                // Render checkboxes
                symptomsContainer.innerHTML = '';
                const categories = ['leaf', 'stem', 'fruit', 'root'];
                
                categories.forEach(cat => { 
                    const catKey = cat === 'fruit' ? 'cat_fruit_cat' : `cat_${cat}`;
                    const catTitle = langStore[catKey] || cat.toUpperCase();
                    let catSymptoms = window.appData.symptomsList.filter(s => s.category === cat);
                    
                    if (cropSymptomsIds) {
                        catSymptoms = catSymptoms.filter(s => cropSymptomsIds.includes(s.id));
                    }
                    
                    if (catSymptoms.length === 0) return; // Skip empty categories

                    const catHeader = document.createElement('h3');
                    catHeader.className = 'symptom-category-title';
                    catHeader.textContent = catTitle;
                    symptomsContainer.appendChild(catHeader);

                    const grid = document.createElement('div');
                    grid.className = 'symptoms-grid';

                    catSymptoms.forEach(sym => {
                        const label = document.createElement('label');
                        label.className = 'symptom-label';
                        label.innerHTML = `
                            <input type="checkbox" name="symptoms" value="${sym.id}">
                            <span class="symptom-text" style="font-weight: 500; font-size: 1.1rem;">${sym[lang] || sym['en']}</span>
                        `;
                        grid.appendChild(label);
                    });
                    
                    symptomsContainer.appendChild(grid);
                });
                
                console.log("Symptoms rendered successfully");
            };

            window.addEventListener('languageChanged', renderSymptoms);
            if (window.appData) renderSymptoms();

            document.getElementById('symptoms-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const symptoms = formData.getAll('symptoms');
                
                if (symptoms.length === 0) {
                    alert(window.appData.langStore[window.currentLang].select_symptom_alert || "Please select at least one symptom.");
                    return;
                }

                // Store selected symptoms and call API
                localStorage.setItem('selectedSymptoms', JSON.stringify(symptoms));
                window.submitDiagnosis(cropId, symptoms, window.currentLang);
            });
        });
    </script>
</body>
</html>
