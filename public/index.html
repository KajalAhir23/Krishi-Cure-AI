<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi-Cure Pro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="warning-banner">
        <marquee scrollamount="5" id="warning_banner">Loading...</marquee>
    </div>

    <header class="app-header">
        <div class="logo">🌿 <span id="app_name">Krishi-Cure Pro</span></div>
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">ENGLISH</button>
            <button class="lang-btn" data-lang="hi">हिन्दी</button>
            <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
        </div>
    </header>

    <main class="container">
        <!-- Step 1: Select Category -->
        <section class="step-card active" id="step-category">
            <h2 id="select_category_title">Select Crop Category</h2>
            <div class="category-grid">
                <div class="cat-card" data-category="field">
                    <span class="icon" style="font-size: 3.5rem;">🌾</span>
                    <span id="cat_field_text" style="font-size: 1.2rem; font-weight: 700;">Field Crops</span>
                </div>
                <div class="cat-card" data-category="fruit">
                    <span class="icon" style="font-size: 3.5rem;">🍎</span>
                    <span id="cat_fruit_text" style="font-size: 1.2rem; font-weight: 700;">Fruits</span>
                </div>
                <div class="cat-card" data-category="vegetable">
                    <span class="icon" style="font-size: 3.5rem;">🥕</span>
                    <span id="cat_vegetable_text" style="font-size: 1.2rem; font-weight: 700;">Vegetables</span>
                </div>
            </div>
        </section>

        <!-- Step 2: Select Crop -->
        <section class="step-card" id="step-crop" style="display: none;">
            <button class="back-btn" id="back-to-cat">Back</button>
            <h2 id="select_crop_title">Select Specific Crop</h2>
            
            <div class="search-container" style="margin-bottom: 1.5rem; position: relative;">
                <input type="text" id="search_crop_input" placeholder="Search crop..." style="width: 100%; padding: 1rem 1.5rem 1rem 3rem; border-radius: 12px; border: 1.5px solid var(--glass-border); font-family: inherit; font-size: 1.1rem; outline: none; transition: var(--transition-smooth); background: white;">
                <span style="position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: var(--text-light);">🔍</span>
            </div>

            <div id="crop-matrix-grid" class="crop-matrix-grid">
                <!-- Row and column crop items populated by JS -->
            </div>

            <button class="primary-btn diagnose-btn" id="next-btn" style="display: none; margin-top: 2.5rem;">Next: Select Symptoms</button>
        </section>
    </main>

    <footer>
        <div class="footer">
            <div class="footer-bottom"></div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await window.initApp();
            
            const stepCategory = document.getElementById('step-category');
            const stepCrop = document.getElementById('step-crop');
            const nextBtn = document.getElementById('next-btn');
            const backBtn = document.getElementById('back-to-cat');
            const searchInput = document.getElementById('search_crop_input');
            
            let selectedCategory = null;

            // Render Translations for categories
            const applyCategoryTranslations = () => {
                const lang = window.currentLang;
                const langStore = window.appData.langStore[lang];
                document.getElementById('select_category_title').textContent = langStore.select_category || "Select Category";
                document.getElementById('cat_field_text').textContent = langStore.cat_field;
                document.getElementById('cat_fruit_text').textContent = langStore.cat_fruit;
                document.getElementById('cat_vegetable_text').textContent = langStore.cat_vegetable;
            };

            window.addEventListener('languageChanged', applyCategoryTranslations);
            if (window.appData) applyCategoryTranslations();

            // Handle Category Selection
            document.querySelectorAll('.cat-card').forEach(card => {
                card.addEventListener('click', () => {
                    selectedCategory = card.dataset.category;
                    searchInput.value = ''; // Reset search on category change
                    renderCrops(selectedCategory);
                    stepCategory.style.display = 'none';
                    stepCrop.style.display = 'block';
                });
            });

            backBtn.addEventListener('click', () => {
                stepCrop.style.display = 'none';
                stepCategory.style.display = 'block';
            });

            // Render Crops based on category (Row and Column Form)
            const renderCrops = (category) => {
                const cat = (typeof category === 'string') ? category : selectedCategory;
                if (!cat) return;

                const cropsList = window.appData.cropsList[cat];
                if (!cropsList) return;

                const lang = window.currentLang;
                const grid = document.getElementById('crop-matrix-grid');
                const searchTerm = searchInput.value.toLowerCase().trim();
                
                grid.innerHTML = '';
                
                const selectedCropId = localStorage.getItem('selectedCrop');

                const filteredCrops = cropsList.filter(crop => {
                    const name = (crop[lang] || crop['en'] || '').toLowerCase();
                    return name.includes(searchTerm);
                });

                if (filteredCrops.length === 0) {
                    const noResults = document.createElement('div');
                    noResults.style.gridColumn = '1 / -1';
                    noResults.style.textAlign = 'center';
                    noResults.style.padding = '2rem';
                    noResults.style.color = 'var(--text-light)';
                    noResults.style.fontWeight = 'bold';
                    noResults.textContent = lang === 'gu' ? "કોઈ પરિણામ મળ્યા નથી" : lang === 'hi' ? "कोई परिणाम नहीं मिला" : "No crops found";
                    grid.appendChild(noResults);
                    return;
                }
                
                filteredCrops.forEach(crop => {
                    const item = document.createElement('div');
                    item.className = 'crop-matrix-item';
                    if (crop.id === selectedCropId) {
                        item.classList.add('selected');
                    }
                    item.innerHTML = `
                        <div class="crop-name">${crop[lang] || crop['en']}</div>
                    `;
                    
                    item.addEventListener('click', () => {
                        // Clear previous selections
                        document.querySelectorAll('.crop-matrix-item').forEach(el => el.classList.remove('selected'));
                        
                        // Set current selection
                        item.classList.add('selected');
                        
                        // Save to localStorage for the next page
                        localStorage.setItem('selectedCrop', crop.id);
                        
                        // Show and update Next button
                        nextBtn.style.display = 'block';
                        nextBtn.textContent = window.appData.langStore[window.currentLang].btn_next_symptoms;
                    });
                    
                    grid.appendChild(item);
                });
            };

            window.addEventListener('languageChanged', renderCrops);
            if (window.appData) renderCrops();

            searchInput.addEventListener('input', () => {
                renderCrops(selectedCategory);
            });

            nextBtn.addEventListener('click', () => {
                window.location.href = '/symptoms.html';
            });
        });
    </script>
</body>
</html>
